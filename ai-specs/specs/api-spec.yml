openapi: 3.0.0
info:
  title: La Nacion Suscripciones API
  description: |
    REST API for La Nacion subscription management system.
    
    This API follows Clean Architecture, CQRS, and Event-Driven Design principles for managing customer subscriptions, plans, billing, and payments.
    
    ## Features
    - Customer (Cliente) management with addresses and payment methods
    - Plan management with benefits and pricing
    - Subscription lifecycle management (create, pause, cancel, renew)
    - Product association with subscriptions
    - Invoice and payment processing
    - Discount coupon system
    - Event publishing for downstream systems
    
    ## Architecture
    - Clean Architecture: Domain -> Application -> Infrastructure -> Presentation
    - CQRS: Commands (writes) and Queries (reads) separation
    - Event-Driven: Outbox Pattern for reliable event publishing
    - Domain Events: `evt-{squad}-{entity}-{verb-past}`
    
  version: 1.0.0
  contact:
    name: Suscripciones Development Team
  license:
    name: Proprietary

servers:
  - url: http://localhost:5000
    description: Development server
  - url: https://api.suscripciones.lanacion.com.ar
    description: Production server

paths:
  /api/v1/clientes:
    get:
      summary: Get all customers
      description: Retrieve a paginated list of customers with optional filtering
      tags:
        - Clientes
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page
        - in: query
          name: estado
          schema:
            type: string
            enum: [Activo, Inactivo, Suspendido]
          description: Filter by customer status
      responses:
        '200':
          description: Successfully retrieved customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteListResponse'
        '400':
          description: Invalid request parameters
        '500':
          description: Internal server error

    post:
      summary: Create a new customer
      description: Register a new customer in the system
      tags:
        - Clientes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClienteRequest'
      responses:
        '201':
          description: Customer created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteResponse'
        '400':
          description: Validation error
        '500':
          description: Internal server error

  /api/v1/clientes/{id}:
    get:
      summary: Get customer by ID
      description: Retrieve detailed information about a specific customer
      tags:
        - Clientes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Customer ID (GUID)
      responses:
        '200':
          description: Successfully retrieved customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteDetailsResponse'
        '404':
          description: Customer not found
        '500':
          description: Internal server error

  /api/v1/planes:
    get:
      summary: Get all active plans
      description: Retrieve all plans available for subscription
      tags:
        - Planes
      parameters:
        - in: query
          name: esDigital
          schema:
            type: boolean
          description: Filter by digital-only plans
      responses:
        '200':
          description: Successfully retrieved plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlanResponse'
        '500':
          description: Internal server error

    post:
      summary: Create a new plan
      description: Create a new subscription plan
      tags:
        - Planes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlanRequest'
      responses:
        '201':
          description: Plan created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanResponse'
        '400':
          description: Validation error
        '500':
          description: Internal server error

  /api/v1/suscripciones:
    get:
      summary: Get subscriptions
      description: Retrieve subscriptions with optional filters
      tags:
        - Suscripciones
      parameters:
        - in: query
          name: clienteId
          schema:
            type: string
            format: uuid
          description: Filter by customer ID
        - in: query
          name: estado
          schema:
            type: string
            enum: [Pendiente, Activa, Pausada, Cancelada, Vencida]
          description: Filter by subscription status
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: Items per page
      responses:
        '200':
          description: Successfully retrieved subscriptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuscripcionListResponse'
        '500':
          description: Internal server error

    post:
      summary: Create a new subscription
      description: Create a subscription for a customer to a specific plan
      tags:
        - Suscripciones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSuscripcionRequest'
      responses:
        '201':
          description: Subscription created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuscripcionResponse'
        '400':
          description: Validation error
        '500':
          description: Internal server error

  /api/v1/suscripciones/{id}:
    get:
      summary: Get subscription by ID
      description: Retrieve detailed subscription information
      tags:
        - Suscripciones
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Subscription ID
      responses:
        '200':
          description: Successfully retrieved subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuscripcionDetailsResponse'
        '404':
          description: Subscription not found
        '500':
          description: Internal server error

    put:
      summary: Update subscription
      description: Update subscription details or status
      tags:
        - Suscripciones
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Subscription ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSuscripcionRequest'
      responses:
        '200':
          description: Subscription updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuscripcionResponse'
        '400':
          description: Validation error
        '404':
          description: Subscription not found
        '500':
          description: Internal server error

  /api/v1/suscripciones/{id}/pausar:
    post:
      summary: Pause subscription
      description: Temporarily pause an active subscription
      tags:
        - Suscripciones
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Subscription ID
      responses:
        '200':
          description: Subscription paused successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuscripcionResponse'
        '400':
          description: Subscription cannot be paused
        '404':
          description: Subscription not found
        '500':
          description: Internal server error

  /api/v1/suscripciones/{id}/cancelar:
    post:
      summary: Cancel subscription
      description: Cancel an active or paused subscription
      tags:
        - Suscripciones
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Subscription ID
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                motivo:
                  type: string
                  maxLength: 500
                  description: Cancellation reason
      responses:
        '200':
          description: Subscription cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuscripcionResponse'
        '400':
          description: Subscription cannot be cancelled
        '404':
          description: Subscription not found
        '500':
          description: Internal server error

  /api/v1/facturas:
    get:
      summary: Get invoices
      description: Retrieve invoices with optional filters
      tags:
        - Facturas
      parameters:
        - in: query
          name: suscripcionId
          schema:
            type: string
            format: uuid
          description: Filter by subscription ID
        - in: query
          name: estado
          schema:
            type: string
            enum: [Pendiente, Pagada, Vencida, Anulada]
          description: Filter by invoice status
      responses:
        '200':
          description: Successfully retrieved invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FacturaResponse'
        '500':
          description: Internal server error

  /api/v1/facturas/{id}:
    get:
      summary: Get invoice by ID
      description: Retrieve detailed invoice information
      tags:
        - Facturas
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Invoice ID
      responses:
        '200':
          description: Successfully retrieved invoice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacturaDetailsResponse'
        '404':
          description: Invoice not found
        '500':
          description: Internal server error

  /api/v1/cupones:
    get:
      summary: Get active coupons
      description: Retrieve all active discount coupons
      tags:
        - Cupones
      responses:
        '200':
          description: Successfully retrieved coupons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CuponDescuentoResponse'
        '500':
          description: Internal server error

    post:
      summary: Create a discount coupon
      description: Create a new discount coupon
      tags:
        - Cupones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCuponRequest'
      responses:
        '201':
          description: Coupon created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CuponDescuentoResponse'
        '400':
          description: Validation error
        '500':
          description: Internal server error

  /api/v1/cupones/validar:
    post:
      summary: Validate coupon code
      description: Check if a coupon code is valid for use
      tags:
        - Cupones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                codigo:
                  type: string
                  description: Coupon code to validate
                montoCompra:
                  type: number
                  description: Purchase amount for percentage calculations
              required:
                - codigo
      responses:
        '200':
          description: Coupon validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidarCuponResponse'
        '400':
          description: Invalid or expired coupon
        '500':
          description: Internal server error

components:
  schemas:
    # Cliente schemas
    ClienteListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ClienteResponse'
        metadata:
          $ref: '#/components/schemas/PaginationMetadata'
      required:
        - data
        - metadata'

    ClienteResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Customer ID
        nombre:
          type: string
          description: Customer full name
        email:
          type: string
          format: email
          description: Customer email
        telefono:
          type: string
          nullable: true
          description: Phone number
        tipoDocumento:
          type: string
          description: Document type (DNI/CUIT/CUIL)
        numeroDocumento:
          type: string
          description: Document number
        estado:
          type: string
          enum: [Activo, Inactivo, Suspendido]
          description: Customer status
        fechaAlta:
          type: string
          format: date-time
          description: Registration date
      required:
        - id
        - nombre
        - email
        - tipoDocumento
        - numeroDocumento
        - estado
        - fechaAlta

    ClienteDetailsResponse:
      allOf:
        - $ref: '#/components/schemas/ClienteResponse'
        - type: object
          properties:
            fechaNacimiento:
              type: string
              format: date
              nullable: true
            provincia:
              type: string
              nullable: true
            localidad:
              type: string
              nullable: true
            direccion:
              type: string
              nullable: true
            codigoPostal:
              type: string
              nullable: true
            origen:
              type: string
              nullable: true
            suscripciones:
              type: array
              items:
                $ref: '#/components/schemas/SuscripcionResponse'
            metodosPago:
              type: array
              items:
                $ref: '#/components/schemas/MetodoPagoResponse'
            direccionesEntrega:
              type: array
              items:
                $ref: '#/components/schemas/DireccionEntregaResponse'

    CreateClienteRequest:
      type: object
      properties:
        nombre:
          type: string
          maxLength: 255
          description: Customer full name
        email:
          type: string
          format: email
          maxLength: 255
          description: Customer email
        telefono:
          type: string
          maxLength: 20
          nullable: true
        tipoDocumento:
          type: string
          maxLength: 10
          description: Document type
        numeroDocumento:
          type: string
          maxLength: 20
          description: Document number
        fechaNacimiento:
          type: string
          format: date
          nullable: true
        provincia:
          type: string
          maxLength: 100
          nullable: true
        localidad:
          type: string
          maxLength: 100
          nullable: true
        direccion:
          type: string
          maxLength: 500
          nullable: true
        codigoPostal:
          type: string
          maxLength: 10
          nullable: true
        origen:
          type: string
          enum: [Web, CallCenter, Tienda, Partner]
          description: Acquisition source
      required:
        - nombre
        - email
        - tipoDocumento
        - numeroDocumento

    # Plan schemas
    PlanResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
          description: Plan name
        descripcion:
          type: string
          nullable: true
        precio:
          type: number
          format: decimal
          description: Monthly price
        periodoFacturacion:
          type: string
          enum: [Mensual, Trimestral, Anual]
          description: Billing period
        diasTrial:
          type: integer
          description: Trial days
        permitePausa:
          type: boolean
          description: Allows pause
        esPlanDigital:
          type: boolean
          description: Digital-only plan
        incluyeEntregaFisica:
          type: boolean
          description: Includes physical delivery
        estado:
          type: string
          enum: [Activo, Inactivo, Borrador]
        beneficios:
          type: array
          items:
            $ref: '#/components/schemas/PlanBeneficioResponse'
      required:
        - id
        - nombre
        - precio
        - periodoFacturacion
        - estado

    CreatePlanRequest:
      type: object
      properties:
        nombre:
          type: string
          maxLength: 100
          description: Plan name
        descripcion:
          type: string
          maxLength: 500
          nullable: true
        precio:
          type: number
          minimum: 0
          description: Monthly price
        periodoFacturacion:
          type: string
          enum: [Mensual, Trimestral, Anual]
        diasTrial:
          type: integer
          minimum: 0
          default: 0
        permitePausa:
          type: boolean
          default: false
        maxProductos:
          type: integer
          nullable: true
        esPlanDigital:
          type: boolean
          default: false
        incluyeEntregaFisica:
          type: boolean
          default: false
        caracteristicas:
          type: object
          nullable: true
          description: JSON features object
      required:
        - nombre
        - precio
        - periodoFacturacion

    PlanBeneficioResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
        descripcion:
          type: string
          nullable: true
        tipo:
          type: string
          enum: [DigitalAccess, PhysicalDelivery, Discount, Content]
        esBeneficioBase:
          type: boolean

    # Suscripcion schemas
    SuscripcionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SuscripcionResponse'
        metadata:
          $ref: '#/components/schemas/PaginationMetadata'
      required:
        - data
        - metadata'

    SuscripcionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        numeroSuscripcion:
          type: string
          description: Human-readable subscription number
        estado:
          type: string
          enum: [Pendiente, Activa, Pausada, Cancelada, Vencida]
        fechaInicio:
          type: string
          format: date-time
        fechaFin:
          type: string
          format: date-time
          nullable: true
        fechaProximoVencimiento:
          type: string
          format: date-time
        precioFinal:
          type: number
          format: decimal
        clienteId:
          type: string
          format: uuid
        planId:
          type: string
          format: uuid
        origen:
          type: string
          enum: [Web, App, CallCenter, Tienda]
      required:
        - id
        - numeroSuscripcion
        - estado
        - fechaInicio
        - precioFinal
        - clienteId
        - planId
        - origen

    SuscripcionDetailsResponse:
      allOf:
        - $ref: '#/components/schemas/SuscripcionResponse'
        - type: object
          properties:
            fechaCancelacion:
              type: string
              format: date-time
              nullable: true
            motivoCancelacion:
              type: string
              nullable: true
            periodicidad:
              type: string
            notas:
              type: string
              nullable: true
            fechaAlta:
              type: string
              format: date-time
            cliente:
              $ref: '#/components/schemas/ClienteResponse'
            plan:
              $ref: '#/components/schemas/PlanResponse'
            productos:
              type: array
              items:
                $ref: '#/components/schemas/SuscripcionProductoResponse'
            facturas:
              type: array
              items:
                $ref: '#/components/schemas/FacturaResponse'

    CreateSuscripcionRequest:
      type: object
      properties:
        clienteId:
          type: string
          format: uuid
          description: Customer ID
        planId:
          type: string
          format: uuid
          description: Plan ID
        cuponDescuentoId:
          type: string
          format: uuid
          nullable: true
          description: Discount coupon ID
        direccionEntregaId:
          type: string
          format: uuid
          nullable: true
          description: Delivery address ID (for physical plans)
        origen:
          type: string
          enum: [Web, App, CallCenter, Tienda]
          default: Web
        productos:
          type: array
          items:
            type: object
            properties:
              productoId:
                type: string
                format: uuid
              cantidad:
                type: integer
                minimum: 1
                default: 1
          description: Products to include in subscription
      required:
        - clienteId
        - planId
        - origen

    UpdateSuscripcionRequest:
      type: object
      properties:
        estado:
          type: string
          enum: [Pendiente, Activa, Pausada, Cancelada, Vencida]
          description: Subscription status
        notas:
          type: string
          maxLength: 1000
          nullable: true

    SuscripcionProductoResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        cantidad:
          type: integer
        precioUnitario:
          type: number
          format: decimal
        productoId:
          type: string
          format: uuid
        productoNombre:
          type: string
        fechaAgregado:
          type: string
          format: date-time

    # Factura schemas
    FacturaResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        numeroFactura:
          type: string
          description: Invoice number
        fechaEmision:
          type: string
          format: date-time
        fechaVencimiento:
          type: string
          format: date-time
        subtotal:
          type: number
          format: decimal
        impuestos:
          type: number
          format: decimal
        descuentos:
          type: number
          format: decimal
        total:
          type: number
          format: decimal
        estado:
          type: string
          enum: [Pendiente, Pagada, Vencida, Anulada]
        suscripcionId:
          type: string
          format: uuid
      required:
        - id
        - numeroFactura
        - fechaEmision
        - total
        - estado

    FacturaDetailsResponse:
      allOf:
        - $ref: '#/components/schemas/FacturaResponse'
        - type: object
          properties:
            periodoDesde:
              type: string
              format: date-time
            periodoHasta:
              type: string
              format: date-time
            fechaPago:
              type: string
              format: date-time
              nullable: true
            codigoAutorizacion:
              type: string
              nullable: true
            observaciones:
              type: string
              nullable: true
            metodoPago:
              $ref: '#/components/schemas/MetodoPagoResponse'
            detalles:
              type: array
              items:
                $ref: '#/components/schemas/FacturaDetalleResponse'

    FacturaDetalleResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        descripcion:
          type: string
        cantidad:
          type: integer
        precioUnitario:
          type: number
          format: decimal
        importe:
          type: number
          format: decimal
        tipoItem:
          type: string
          enum: [Product, Service, Discount, Tax]

    # MetodoPago schemas
    MetodoPagoResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tipo:
          type: string
          enum: [TarjetaCredito, TarjetaDebito, CuentaMP, TarjetaLN]
        ultimosDigitos:
          type: string
          maxLength: 4
        titular:
          type: string
        fechaVencimiento:
          type: string
          format: date
          nullable: true
        marca:
          type: string
          nullable: true
        esMetodoPrincipal:
          type: boolean

    # DireccionEntrega schemas
    DireccionEntregaResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        alias:
          type: string
        direccion:
          type: string
        pisoDepartamento:
          type: string
          nullable: true
        codigoPostal:
          type: string
        provincia:
          type: string
        localidad:
          type: string
        entreCalles:
          type: string
          nullable: true
        instruccionesEntrega:
          type: string
          nullable: true
        telefonoContacto:
          type: string
          nullable: true
        esDireccionPrincipal:
          type: boolean

    # Cupon schemas
    CuponDescuentoResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        codigo:
          type: string
        tipoDescuento:
          type: string
          enum: [Percentage, FixedAmount]
        valorDescuento:
          type: number
          format: decimal
        montoMinimo:
          type: number
          format: decimal
          nullable: true
        montoMaximoDescuento:
          type: number
          format: decimal
          nullable: true
        fechaInicioValidez:
          type: string
          format: date-time
        fechaFinValidez:
          type: string
          format: date-time
        esActivo:
          type: boolean
        cantidadUsosActual:
          type: integer
        cantidadMaximaUsos:
          type: integer
          nullable: true
        descripcion:
          type: string
          nullable: true

    CreateCuponRequest:
      type: object
      properties:
        codigo:
          type: string
          maxLength: 50
          description: Unique coupon code
        tipoDescuento:
          type: string
          enum: [Percentage, FixedAmount]
        valorDescuento:
          type: number
          minimum: 0
          description: Discount value
        montoMinimo:
          type: number
          nullable: true
        montoMaximoDescuento:
          type: number
          nullable: true
        cantidadMaximaUsos:
          type: integer
          nullable: true
        fechaInicioValidez:
          type: string
          format: date-time
        fechaFinValidez:
          type: string
          format: date-time
        planesAplicables:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
          description: Plan IDs this coupon applies to (null = all plans)
        descripcion:
          type: string
          nullable: true
      required:
        - codigo
        - tipoDescuento
        - valorDescuento
        - fechaInicioValidez
        - fechaFinValidez

    ValidarCuponResponse:
      type: object
      properties:
        valido:
          type: boolean
        codigo:
          type: string
        tipoDescuento:
          type: string
          nullable: true
        valorDescuento:
          type: number
          format: decimal
          nullable: true
        descuentoCalculado:
          type: number
          format: decimal
          nullable: true
        mensaje:
          type: string
          description: Validation message

    # Common schemas
    PaginationMetadata:
      type: object
      properties:
        total:
          type: integer
          description: Total records
        page:
          type: integer
          description: Current page
        limit:
          type: integer
          description: Items per page
        totalPages:
          type: integer
          description: Total pages

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Error message
        code:
          type: string
          description: Error code
        details:
          type: object
          nullable: true
          description: Additional error details
      required:
        - message
        - code

